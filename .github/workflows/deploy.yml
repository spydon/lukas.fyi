name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v6
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: dart pub get

      - name: Activate Jaspr CLI
        run: dart pub global activate jaspr_cli

      - name: Build site
        run: dart pub global run jaspr_cli:jaspr build

      - name: Assemble Cloudflare deploy directory
        run: |
          rm -rf deploy
          mkdir -p deploy/public
          cp -r build/jaspr/. deploy/public/
          rm -rf deploy/public/.dart_tool deploy/public/.build.manifest
          cp wrangler.jsonc deploy/wrangler.jsonc

      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: web
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "Deploy ${{ github.sha }}"
